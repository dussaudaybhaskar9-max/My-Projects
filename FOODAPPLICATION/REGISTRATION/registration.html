<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ucart Registion page</title>
    <link rel="stylesheet" href="./registation.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card">
        <h2>Create Account</h2>
        <p>Please fill in your details to register</p>
        <form action="" id="formContainer">
            <div class="from-group">
                <label for="">Full Name </label>
                <input type="text" id="name" placeholder="Dussa Uday Bhaskar" required>
            </div>
            <div class="from-group">
                <label for="">Email Address</label>
                <input type="email" id="email" placeholder="uday@email.com" required>
            </div>
            <div class="from-group">
                <label for="">Password</label>
                <input type="password" id="password" placeholder="********" required>
            </div>
            <div class="from-group">
                <label for="">Mobile Number</label>
                <input type="tel" id="mobile" placeholder="+91 1234567890" required>
            </div>
            <div class="from-group">
                <button type="submit" class="submit-btn">Register</button>
            </div>

            <div class="footer-text">
                <p>Alredy have a account ? <a href="./login.html">SigIn</a></p>
                © 2026 Your Company . All Rights Reserved.
            </div>

        </form>
    </div>






    <script src="./registration.js" defer> </script>
</body>
</html>
